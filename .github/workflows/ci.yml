name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          # No cache: the tarball has no dependencies at runtime, and the
          # peer (@zakkster/lite-signal) is installed on every run via
          # `npm install` -- fast enough that caching is noise.

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Behavior tests
        run: npm test

      - name: Zero-GC stress tests
        run: npm run test:gc

      - name: Report Node & Intl coverage
        if: always()
        run: |
          node -e "console.log('node:', process.version); \
                   console.log('Intl.NumberFormat:', typeof Intl.NumberFormat); \
                   console.log('Intl.DateTimeFormat:', typeof Intl.DateTimeFormat); \
                   console.log('Intl.ListFormat:', typeof Intl.ListFormat); \
                   console.log('Intl.RelativeTimeFormat:', typeof Intl.RelativeTimeFormat); \
                   console.log('Intl.PluralRules:', typeof Intl.PluralRules); \
                   console.log('Intl.PluralRules ordinal:', new Intl.PluralRules('en',{type:'ordinal'}).select(1));"
